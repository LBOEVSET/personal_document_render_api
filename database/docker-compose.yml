version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: prisonDB
    restart: unless-stopped
    environment:
      POSTGRES_USER: prisonDB_backend
      POSTGRES_PASSWORD: lboevset20011966
      POSTGRES_DB: prisonDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: prisonDB_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin_console_20011966
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:

